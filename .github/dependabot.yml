version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
    # NOTE: dependabot の cooldown は github-actions ecosystem で未対応 (dependabot-core#14628)。
    # 代わりに SECURITY.md に「リリースから 14 日経過後に手動マージ」の運用ルールを記載している。

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Run build_csv self-test
        run: python3 scripts/test_build_csv.py

      - name: Verify SKILL.md frontmatter
        run: |
          python3 - <<'PY'
          import re, sys
          from pathlib import Path

          text = Path("SKILL.md").read_text(encoding="utf-8")
          if not text.startswith("---\n"):
              sys.exit("SKILL.md must start with frontmatter '---'")
          end = text.find("\n---\n", 4)
          if end == -1:
              sys.exit("SKILL.md frontmatter not closed")
          fm = text[4:end]

          if not re.search(r"^name:\s*[a-z0-9][a-z0-9-]*\s*$", fm, re.MULTILINE):
              sys.exit("SKILL.md 'name' must be kebab-case [a-z0-9-]+")
          if not re.search(r"^description:", fm, re.MULTILINE):
              sys.exit("SKILL.md 'description' is required")
          print("SKILL.md frontmatter OK")
          PY

      - name: Verify examples are Shift-JIS / CRLF / under 200KB
        run: |
          python3 - <<'PY'
          import sys
          from pathlib import Path

          MAX = 200_000
          for csv_path in Path("examples").glob("*.csv"):
              data = csv_path.read_bytes()
              if len(data) >= MAX:
                  sys.exit(f"{csv_path}: {len(data)} bytes >= {MAX}")
              try:
                  data.decode("cp932")
              except UnicodeDecodeError as exc:
                  sys.exit(f"{csv_path}: not valid Shift-JIS: {exc}")
              if b"\r\n" not in data:
                  sys.exit(f"{csv_path}: missing CRLF")
              stripped = data.replace(b"\r\n", b"")
              if b"\n" in stripped or b"\r" in stripped:
                  sys.exit(f"{csv_path}: contains bare LF or CR")
              print(f"{csv_path}: OK ({len(data)} bytes)")
          PY

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.8.4

      - name: Lint
        run: ruff check scripts
